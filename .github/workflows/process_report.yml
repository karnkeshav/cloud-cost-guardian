name: Process Billing Report

on:
  push:
    paths:
      - 'data/raw/cur_report_updated.csv'
      

# Prevents multiple runs from queuing up
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to v4 for better performance

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10' # Updated to a more current version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Agentic Workflow
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/processor.py
